name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    env:
      APP_VERSION: "1.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Package APK
        run: |
          set -euo pipefail
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi
          VERSIONED_APK="InspiracionDia-Android-v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$APK_PATH" "$VERSIONED_APK"
          cp "$APK_PATH" InspiracionDia-Android-latest.apk
          ls -lh "$VERSIONED_APK" InspiracionDia-Android-latest.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: InspiracionDia-android-apk
          path: InspiracionDia-Android-latest.apk
          retention-days: 3

      - name: Publish latest Android release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSIONED_APK="InspiracionDia-Android-v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}.apk"
          if gh release view latest-android >/dev/null 2>&1; then
            gh release upload latest-android InspiracionDia-Android-latest.apk "$VERSIONED_APK" --clobber
          else
            gh release create latest-android InspiracionDia-Android-latest.apk "$VERSIONED_APK" \
              --title "Latest Android APK" \
              --notes "Latest Android APK built from ${GITHUB_SHA}."
          fi
